server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /certs/ca.crt {
        proxy_pass http://api-broker:8000/certs/ca.crt;
    }

    location /ws {
        proxy_pass http://api-broker:8000/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }

    location /messages {
        proxy_pass http://api-broker:8000/messages;
    }

    location /config {
        proxy_pass http://api-broker:8000/config;
    }

    location /test-notify {
        proxy_pass http://api-broker:8000/test-notify;
    }

    location /push {
        proxy_pass http://api-broker:8000/push;
    }
}

server {
    listen 443 ssl;
    server_name localhost;

    ssl_certificate /data/certs/server.crt;
    ssl_certificate_key /data/certs/server.key;

    # Basic SSL optimization
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /certs/ca.crt {
        proxy_pass http://api-broker:8000/certs/ca.crt;
    }

    location /ws {
        proxy_pass http://api-broker:8000/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }

    location /messages {
        proxy_pass http://api-broker:8000/messages;
    }

    location /config {
        proxy_pass http://api-broker:8000/config;
    }

    location /test-notify {
        proxy_pass http://api-broker:8000/test-notify;
    }

    location /push {
        proxy_pass http://api-broker:8000/push;
    }
}
