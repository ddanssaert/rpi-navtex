version: '3.8'

services:
  sdr-dsp:
    build:
      context: ./sdr-dsp
      dockerfile: Dockerfile
    container_name: sdr-dsp
    restart: unless-stopped
    privileged: true          # Required for USB SDR device access
    devices:
      - /dev/bus/usb:/dev/bus/usb
    volumes:
      - sqlite_data:/data
    environment:
      - SDR_ANTENNA=A
      - SDR_LNA_STATE=0
      - BROKER_URL=http://api-broker:8000/messages
    depends_on:
      - api-broker

  api-broker:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: api-broker
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - sqlite_data:/data
    environment:
      - DB_PATH=/data/navtex.db
      - HOST_IP=192.168.2.246
      - SDR_CONTROL_URL=http://sdr-dsp:8001/control/config

  pwa-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pwa-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
      - "80:80"
    volumes:
      - sqlite_data:/data:ro
    depends_on:
      - api-broker

volumes:
  sqlite_data:
