version: '3.8'

services:
  sdr-dsp:
    build:
      context: ./sdr-dsp
      dockerfile: Dockerfile
    container_name: sdr-dsp
    restart: on-failure
    privileged: true          # Required for USB SDR device access
    devices:
      - /dev/bus/usb:/dev/bus/usb
    networks:
      - navtex_net
    volumes:
      - sqlite_data:/data
    environment:
      - SDR_ANTENNA=A
      - SDR_LNA_STATE=0
      - BROKER_URL=http://api-broker:8000/messages
    depends_on:
      - api-broker

  api-broker:
    build: 
      context: ./api
      dockerfile: Dockerfile
    container_name: api-broker
    networks:
      - navtex_net
    volumes:
      - sqlite_data:/data
    ports:
      - "8000:8000"

  pwa-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pwa-frontend
    networks:
      - navtex_net
    ports:
      - "80:80"
    depends_on:
      - api-broker
    
networks:
  navtex_net:
    driver: bridge

volumes:
  sqlite_data:
