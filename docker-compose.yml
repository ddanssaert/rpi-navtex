version: '3.8'

services:
  sdr-dsp:
    build:
      context: ./sdr-dsp
      dockerfile: Dockerfile
    container_name: sdr-dsp
    restart: unless-stopped
    network_mode: host
    privileged: true          # Required for USB SDR device access
    devices:
      - /dev/bus/usb:/dev/bus/usb
    volumes:
      - sqlite_data:/data
    environment:
      - SDR_ANTENNA=A
      - SDR_LNA_STATE=0
      - BROKER_URL=http://localhost:8000/messages
    depends_on:
      - api-broker

  api-broker:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: api-broker
    restart: unless-stopped
    network_mode: host
    volumes:
      - sqlite_data:/data
    environment:
      - DB_PATH=/data/navtex.db

  pwa-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pwa-frontend
    restart: unless-stopped
    network_mode: host
    volumes:
      - sqlite_data:/data:ro
    depends_on:
      - api-broker

volumes:
  sqlite_data:
