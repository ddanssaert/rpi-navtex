version: '3.8'

services:
  sdr-dsp:
    image: ghcr.io/${GITHUB_REPOSITORY:-ddanssaert/rpi-navtex}/sdr-dsp:latest
    container_name: sdr-dsp
    restart: unless-stopped
    network_mode: host
    privileged: true
    devices:
      - /dev/bus/usb:/dev/bus/usb
    volumes:
      - sqlite_data:/data
    environment:
      - SDR_ANTENNA=A
      - SDR_LNA_STATE=0
      - BROKER_URL=http://localhost:8000/messages

  api-broker:
    image: ghcr.io/${GITHUB_REPOSITORY:-ddanssaert/rpi-navtex}/api-broker:latest
    container_name: api-broker
    restart: unless-stopped
    network_mode: host
    volumes:
      - sqlite_data:/data
    environment:
      - DB_PATH=/data/navtex.db

  pwa-frontend:
    image: ghcr.io/${GITHUB_REPOSITORY:-ddanssaert/rpi-navtex}/pwa-frontend:latest
    container_name: pwa-frontend
    restart: unless-stopped
    network_mode: host
    volumes:
      - sqlite_data:/data:ro
    depends_on:
      - api-broker

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 86400 --cleanup --rolling-restart
    environment:
      - WATCHTOWER_LIFECYCLE_HOOKS=1

volumes:
  sqlite_data:
