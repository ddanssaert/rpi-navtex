name: Build Navtex Appliance OS Image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image Tag (e.g. v0.1.17)'
        required: true
        default: 'v0.1.17'
  push:
    paths:
      - 'image/**'
      - '.github/workflows/build-os-image.yml'
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-appliance:
    # We no longer "need" publish-images here because they are assumed 
    # to be in GHCR. If a tag is pushed, both workflows start. 
    # pi-gen takes ~40 mins, docker build takes ~5 mins. 
    # The pull will succeed.
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache /usr/local/share/boost
          docker system prune -af || true
          df -h

      - name: Stage navtex source for chroot
        run: |
          mkdir -p image/stage-navtex/03-stack/files/navtex-src
          rsync -a --exclude='.git' --exclude='image' --exclude='.planning' \
                --exclude='node_modules' --exclude='deploy' --exclude='work' \
                ./ image/stage-navtex/03-stack/files/navtex-src/

      - name: Build image with manual pi-gen
        env:
          IMG_NAME: navtex
          RELEASE: bookworm
          DEPLOY_COMPRESSION: xz
          COMPRESSION_LEVEL: 6
          TARGET_HOSTNAME: navtex
          FIRST_USER_NAME: navtex
          ENABLE_SSH: 1
          LOCALE_DEFAULT: en_GB.UTF-8
          KEYBOARD_KEYMAP: gb
          KEYBOARD_LAYOUT: English (UK)
          TIMEZONE_DEFAULT: Europe/London
          STAGE_LIST: stage0 stage1 stage2 ./stage-navtex
          PUBKEY_ONLY_SSH: 0
          BASE_IMAGE: debian:bookworm
          FIRST_USER_PASS: navtex
        run: |
          docker run --privileged --rm tonistiigi/binfmt --install all
          sudo apt-get update
          sudo apt-get install -y coreutils quilt parted debootstrap zerofree zip \
                                dosfstools libarchive-tools libcap2-bin grep rsync \
                                xz-utils curl xxd file bc gpg pigz arch-test \
                                qemu-user qemu-user-static binfmt-support jq

          BUILD_DIR="$GITHUB_WORKSPACE/pi-gen-build"
          git clone --depth 1 --branch 2025-11-24-raspios-bookworm-arm64 https://github.com/RPi-Distro/pi-gen.git "$BUILD_DIR"
          
          cp image/config "$BUILD_DIR/config"
          cp -r image/stage-navtex "$BUILD_DIR/stage-navtex"
          
          cd "$BUILD_DIR"
          chmod +x build.sh build-docker.sh
          sed -i 's/trixie/bookworm/g' build-docker.sh
          sed -i 's/trixie/bookworm/g' Dockerfile
          sed -i 's/qemu-arm:qemu-user-binfmt/qemu-arm-static:qemu-user-static/g' depends
          
          docker build -t pi-gen-local .
          
          docker run --privileged --rm \
            --volume "$(pwd):/pi-gen" \
            --workdir /pi-gen \
            --env IMG_NAME \
            --env RELEASE \
            --env DEPLOY_COMPRESSION \
            --env COMPRESSION_LEVEL \
            --env TARGET_HOSTNAME \
            --env FIRST_USER_NAME \
            --env FIRST_USER_PASS \
            --env ENABLE_SSH \
            --env LOCALE_DEFAULT \
            --env KEYBOARD_KEYMAP \
            --env KEYBOARD_LAYOUT \
            --env TIMEZONE_DEFAULT \
            --env STAGE_LIST \
            --env PUBKEY_ONLY_SSH \
            --env BASE_IMAGE \
            pi-gen-local \
            bash -c "git config --global --add safe.directory /pi-gen && mount binfmt_misc -t binfmt_misc /proc/sys/fs/binfmt_misc || true && ./build.sh"

      - name: Locate built image
        id: img
        run: |
          IMG=$(find "$GITHUB_WORKSPACE/pi-gen-build/deploy" -name "*.img.xz" | head -n 1)
          if [ -z "$IMG" ]; then
            echo "::error::No image found in deploy directory"
            exit 1
          fi
          cp "$IMG" "$GITHUB_WORKSPACE/navtex.img.xz"
          echo "path=$GITHUB_WORKSPACE/navtex.img.xz" >> "$GITHUB_OUTPUT"
          sha256sum "$GITHUB_WORKSPACE/navtex.img.xz" > "$GITHUB_WORKSPACE/navtex.img.xz.sha256"

      - name: Generate rpi-imager.json
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          REPO: ${{ github.repository }}
          IMG_PATH: ${{ steps.img.outputs.path }}
          OUT: ${{ github.workspace }}/rpi-imager.json
        run: |
          chmod +x image/scripts/generate-manifest.sh
          bash ./image/scripts/generate-manifest.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: navtex-image-${{ steps.tag.outputs.tag }}
          path: |
            navtex.img.xz
            navtex.img.xz.sha256
            rpi-imager.json
          retention-days: 14

      - name: Create GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          fail_on_unmatched_files: true
          files: |
            navtex.img.xz
            navtex.img.xz.sha256
            rpi-imager.json
          body: |
            Navtex Appliance Image — ${{ steps.tag.outputs.tag }}
            
            SHA256 checksum: see `navtex.img.xz.sha256`.
