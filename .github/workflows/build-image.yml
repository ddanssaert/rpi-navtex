name: Build Navtex Appliance Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Manual tag (e.g. v0.0.0-dev) — used only for workflow_dispatch'
        required: false
        default: 'v0.0.1-dev'

permissions:
  contents: write   # required for Releases upload

jobs:
  build-image:
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache /usr/local/share/boost
          docker system prune -af || true
          df -h

      - name: Stage navtex source for chroot
        # 03-stack/00-run-chroot.sh expects the navtex source at
        # image/stage-navtex/03-stack/files/navtex-src so it can `docker compose build`.
        run: |
          mkdir -p image/stage-navtex/03-stack/files/navtex-src
          rsync -a --exclude='.git' --exclude='image' --exclude='.planning' \
                --exclude='node_modules' --exclude='deploy' --exclude='work' \
                ./ image/stage-navtex/03-stack/files/navtex-src/

      - name: Build image with manual pi-gen
        env:
          # Pass all config as env vars for pi-gen
          IMG_NAME: navtex
          RELEASE: bookworm
          DEPLOY_COMPRESSION: xz
          COMPRESSION_LEVEL: 6
          TARGET_HOSTNAME: navtex
          FIRST_USER_NAME: navtex
          ENABLE_SSH: 1
          LOCALE_DEFAULT: en_GB.UTF-8
          KEYBOARD_KEYMAP: gb
          KEYBOARD_LAYOUT: English (UK)
          TIMEZONE_DEFAULT: Europe/London
          STAGE_LIST: stage0 stage1 stage2 ./stage-navtex
          PUBKEY_ONLY_SSH: 0
          BASE_IMAGE: debian:bookworm
          FIRST_USER_PASS: navtex
        run: |
          # 1. Register QEMU binfmt handlers
          docker run --privileged --rm tonistiigi/binfmt --install all

          # 2. Install host dependencies
          sudo apt-get update
          sudo apt-get install -y coreutils quilt parted debootstrap zerofree zip \
                                dosfstools libarchive-tools libcap2-bin grep rsync \
                                xz-utils curl xxd file bc gpg pigz arch-test \
                                qemu-user qemu-user-static binfmt-support jq

          # 3. Clone pi-gen into workspace to avoid /tmp issues
          BUILD_DIR="$GITHUB_WORKSPACE/pi-gen-build"
          git clone --depth 1 --branch master https://github.com/RPi-Distro/pi-gen.git "$BUILD_DIR"
          
          # 4. Prepare path and config
          cp image/config "$BUILD_DIR/config"
          cp -r image/stage-navtex "$BUILD_DIR/stage-navtex"
          
          # 5. Patch pi-gen
          cd "$BUILD_DIR"
          chmod +x build.sh build-docker.sh
          
          # Force bookworm release
          sed -i 's/trixie/bookworm/g' build-docker.sh
          sed -i 's/trixie/bookworm/g' Dockerfile
          
          # Broad patch out for ANY qemu-user-binfmt check in ANY script
          find . -name "*.sh" -exec sed -i 's/.*qemu-user-binfmt.*/true/g' {} +
          
          # 6. Manual Docker Build & Run (Replacing build-docker.sh for better path control)
          # First build the pi-gen image
          docker build -t pi-gen-local .
          
          # Run the build.sh inside the container manually
          # We mount the entire build dir to /pi-gen and work there.
          # We also fix the dubious ownership error for git.
          docker run --privileged --rm \
            --volume "$(pwd):/pi-gen" \
            --workdir /pi-gen \
            --env IMG_NAME \
            --env RELEASE \
            --env DEPLOY_COMPRESSION \
            --env COMPRESSION_LEVEL \
            --env TARGET_HOSTNAME \
            --env FIRST_USER_NAME \
            --env FIRST_USER_PASS \
            --env ENABLE_SSH \
            --env LOCALE_DEFAULT \
            --env KEYBOARD_KEYMAP \
            --env KEYBOARD_LAYOUT \
            --env TIMEZONE_DEFAULT \
            --env STAGE_LIST \
            --env PUBKEY_ONLY_SSH \
            --env BASE_IMAGE \
            pi-gen-local \
            bash -c "git config --global --add safe.directory /pi-gen && ./build.sh"

      - name: Locate built image
        id: img
        run: |
          # Diagnostic: show deploy dir
          ls -la "$GITHUB_WORKSPACE/pi-gen-build/deploy" || true
          
          IMG=$(find "$GITHUB_WORKSPACE/pi-gen-build/deploy" -name "*.img.xz" | head -n 1)
          if [ -z "$IMG" ]; then
            echo "::error::No image found in deploy directory"
            exit 1
          fi
          # Normalise filename to navtex.img.xz for stable artifacts
          cp "$IMG" "$GITHUB_WORKSPACE/navtex.img.xz"
          echo "path=$GITHUB_WORKSPACE/navtex.img.xz" >> "$GITHUB_OUTPUT"
          
          sha256sum "$GITHUB_WORKSPACE/navtex.img.xz" > "$GITHUB_WORKSPACE/navtex.img.xz.sha256"
          cat "$GITHUB_WORKSPACE/navtex.img.xz.sha256"

      - name: Generate rpi-imager.json
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          REPO: ${{ github.repository }}
          IMG_PATH: ${{ steps.img.outputs.path }}
          OUT: ${{ github.workspace }}/rpi-imager.json
        run: |
          chmod +x image/scripts/generate-manifest.sh
          bash ./image/scripts/generate-manifest.sh
          cat "$OUT"

      - name: Upload artifacts (workflow run)
        uses: actions/upload-artifact@v4
        with:
          name: navtex-image-${{ steps.tag.outputs.tag }}
          path: |
            navtex.img.xz
            navtex.img.xz.sha256
            rpi-imager.json
          retention-days: 14

      - name: Create GitHub Release and upload assets
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          fail_on_unmatched_files: true
          files: |
            navtex.img.xz
            navtex.img.xz.sha256
            rpi-imager.json
          body: |
            Navtex Appliance Image — ${{ steps.tag.outputs.tag }}

            **How to flash:**
            1. Open Raspberry Pi Imager.
            2. Choose Device → Raspberry Pi 3.
            3. Choose OS → "Use custom" or paste this URL into "Add a custom repository":
               `https://github.com/${{ github.repository }}/releases/latest/download/rpi-imager.json`
            4. Click the gear icon → fill in WiFi, hostname, SSH key.
            5. Flash. The Pi boots zero-config; reach it at `http://navtex.local`.

            **Fallback hotspot:** If no known WiFi is reachable, the Pi opens an open AP `Navtex-AP` (192.168.99.1).

            SHA256 checksum: see `navtex.img.xz.sha256`.
